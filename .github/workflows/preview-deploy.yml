name: Deploy to Vercel Preview

on:
  push:
    branches:
      - main

# Cancel any in-progress deployment when a new commit is pushed to main
concurrency:
  group: vercel-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Preview
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          STABLE_ALIAS="${{ secrets.VERCEL_PREVIEW_ALIAS }}"

          vercel pull --yes --environment=preview --token="$TOKEN"

          new_url=$(vercel deploy --yes --token="$TOKEN" 2>/dev/null | tail -n1)
          echo "url=$new_url" >> "$GITHUB_OUTPUT"
          echo "Unique deploy URL: $new_url"

          # Assign stable alias so OAuth redirect URLs never change
          vercel alias set "$new_url" "$STABLE_ALIAS" --token="$TOKEN"
          echo "Stable alias: https://$STABLE_ALIAS"

          # Strip https:// to get bare host for comparison
          new_host=$(echo "$new_url" | sed 's~https://~~')

          # Delete all other preview deployments for this project
          curl -s "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=preview&limit=100" \
            -H "Authorization: Bearer $TOKEN" | \
            jq -r --arg host "$new_host" \
              '.deployments[] | select(.url != $host) | .uid' | \
            while read -r uid; do
              echo "Deleting old deployment: $uid"
              curl -s -X DELETE "https://api.vercel.com/v13/deployments/$uid" \
                -H "Authorization: Bearer $TOKEN" > /dev/null
            done
            
